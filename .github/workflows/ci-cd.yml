name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4  # Get repo code

      - name: Build Docker images
        run: |
          docker build -t expensy-backend ./expensy_backend
          docker build -t expensy-frontend ./expensy_frontend

      - name: Test containers
        run: |
          docker run -d --name test-backend expensy-backend
          docker run -d --name test-frontend expensy-frontend
          sleep 10  # Allow containers to start
          docker ps
          docker stop test-backend test-frontend

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # Only deploy from main

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./expensy_backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/expensy-backend:latest

      - name: Push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./expensy_frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/expensy-frontend:latest